<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />

  <title>Elevrunder – Instruktionsside</title>

  <!-- PWA -->
  <meta name="theme-color" content="#1f2c3f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Elevrunder" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --page-max: 760px;
      --gap: 8px;
      --radius: 22px;
      --shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
      --timer-bg: #1f2c3f;
      --circle-size: min(30vw, 126px);
      --modal-circle-size: min(52vw, 290px);
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #d9dee4;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    .page {
      width: 100%;
      max-width: var(--page-max);
      height: 100dvh;
      display: grid;
      grid-template-rows: 27% 20% 33% 20%;
      gap: var(--gap);
      padding: var(--gap);
      overflow: hidden;
      transition: filter 0.22s ease;
    }

    .page.blurred {
      filter: blur(5px);
    }

    .panel {
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: 0;
    }

    .timer-panel {
      background: var(--timer-bg);
      color: #fff;
      position: relative;
      min-height: 0;
      padding: 10px 12px;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .timer-split {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      align-items: stretch;
      min-height: 0;
    }

    .timer-left,
    .timer-right {
      min-height: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .timer-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      height: 100%;
      position: relative;
      min-height: 0;
    }

    .timer-title {
      font-size: clamp(0.9rem, 2.3vw, 1rem);
      font-weight: 700;
      line-height: 1;
      margin: 0;
      opacity: 0.96;
      text-align: center;
    }

    .timer-subhint {
      font-size: clamp(0.72rem, 1.8vw, 0.8rem);
      opacity: 0.8;
      text-align: center;
      margin-top: -2px;
      margin-bottom: 2px;
    }

    .corner-minute {
      position: absolute;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1.4px solid rgba(255,255,255,0.30);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.78rem;
      cursor: pointer;
      user-select: none;
      transition: all 0.18s ease;
      z-index: 2;
    }

    .corner-minute.active {
      border-color: rgba(255,255,255,0.92);
      box-shadow: 0 0 0 2px rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.14);
      color: #fff;
    }

    .corner-1 { top: 8px; left: 2px; }
    .corner-2 { top: 8px; right: 2px; }
    .corner-3 { bottom: 6px; left: 2px; }
    .corner-4 { bottom: 6px; right: 2px; }

    .pie-timer {
      width: var(--circle-size);
      height: var(--circle-size);
      position: relative;
      cursor: pointer;
      user-select: none;
      touch-action: manipulation;
      flex: 0 0 auto;
    }

    .pie-timer svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .pie-bg {
      fill: rgba(255,255,255,0.16);
    }

    .pie-slice {
      fill: #22c55e;
      transition: fill 0.2s linear;
    }

    .pie-slice.warning {
      fill: #ef4444;
    }

    .pie-center {
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      background: #f2f2f2;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pie-time {
      font-size: clamp(1rem, 3vw, 1.18rem);
      font-weight: 700;
      color: #0f1c2f;
      letter-spacing: 0.4px;
    }

    .selector-circle {
      width: var(--circle-size);
      height: var(--circle-size);
      border-radius: 50%;
      border: none;
      background: #f2f2f2;
      color: #0f1c2f;
      font-size: clamp(1rem, 3vw, 1.18rem);
      font-weight: 700;
      cursor: pointer;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 14px;
      line-height: 1.12;
      white-space: normal;
    }

    .selector-circle.has-result {
      background: #22c55e;
      color: #fff;
    }

    .reset-btn {
      border: none;
      border-radius: 999px;
      padding: 6px 12px;
      min-height: 30px;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      background: #f2f2f2;
      color: #111827;
      box-shadow: var(--shadow);
    }

    .section {
      min-height: 0;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .orientation {
      background: #ead046;
      color: #111;
      align-items: center;
      justify-content: center;
    }

    .challenge {
      background: #de4a40;
      color: #fff;
      align-items: center;
      justify-content: center;
    }

    .story {
      background: #47bb59;
      color: #111;
      align-items: center;
      justify-content: center;
    }

    .center-block {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 0;
      height: 100%;
      width: 100%;
      gap: 8px;
    }

    .section-top {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      width: 100%;
    }

    h2 {
      margin: 0;
      font-size: clamp(1rem, 4vw, 1.45rem);
      line-height: 1.02;
      text-align: center;
      font-weight: 700;
      width: 100%;
    }

    h3 {
      margin: 0 0 4px 0;
      font-size: clamp(0.82rem, 2.4vw, 0.95rem);
      line-height: 1.05;
      text-align: center;
      width: 100%;
    }

    .button-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }

    .read-btn,
    .desc-btn {
      border: none;
      border-radius: 14px;
      padding: 8px 14px;
      min-height: 36px;
      font-size: clamp(0.8rem, 2.2vw, 0.9rem);
      font-weight: 700;
      cursor: pointer;
      box-shadow: var(--shadow);
      background: #161b24;
      color: #fff;
    }

    .overlay,
    .picker-overlay,
    .timer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.22);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 999;
    }

    .overlay.show,
    .picker-overlay.show,
    .timer-overlay.show {
      display: flex;
    }

    .modal,
    .picker-modal {
      width: min(94vw, 620px);
      max-height: 84dvh;
      overflow: auto;
      background: #ffffff;
      color: #111827;
      border-radius: 20px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.24);
      padding: 20px 18px 16px;
    }

    .timer-modal {
      width: min(92vw, 520px);
      max-height: min(82dvh, 620px);
      overflow: hidden;
      background: #1f2c3f;
      color: #fff;
      border-radius: 26px;
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.32);
      padding: 16px 16px 18px;
      display: flex;
      flex-direction: column;
    }

    .modal-title,
    .picker-title,
    .timer-modal-title {
      margin: 0 0 12px 0;
      font-size: 1.08rem;
      line-height: 1.2;
      text-align: center;
    }

    .timer-modal-title {
      font-size: clamp(1.05rem, 3vw, 1.28rem);
      margin-bottom: 4px;
    }

    .timer-modal-hint {
      text-align: center;
      font-size: 0.88rem;
      opacity: 0.88;
      margin-bottom: 10px;
    }

    .modal-text {
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 16px;
      text-align: left;
    }

    .modal-text p {
      margin: 0 0 10px 0;
      text-align: center;
    }

    .modal-text ul {
      margin: 8px 0 0 0;
      padding-left: 22px;
    }

    .modal-text li {
      margin: 0 0 10px 0;
    }

    .modal-actions,
    .picker-actions,
    .timer-modal-actions {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .close-btn,
    .picker-btn,
    .draw-overlay-btn,
    .remove-pool-btn,
    .timer-btn {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      min-height: 44px;
      font-size: 0.94rem;
      font-weight: 700;
      cursor: pointer;
      background: #111827;
      color: #fff;
    }

    .timer-btn {
      background: #f2f2f2;
      color: #111827;
      min-height: 42px;
      padding: 10px 16px;
    }

    .draw-overlay-btn {
      background: #22c55e;
    }

    .draw-overlay-btn:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }

    .remove-pool-btn {
      min-height: 34px;
      padding: 6px 10px;
      font-size: 0.8rem;
      background: #dc2626;
      border-radius: 10px;
    }

    .name-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    .name-btn {
      border: 2px solid #cbd5e1;
      border-radius: 14px;
      min-height: 46px;
      background: #f8fafc;
      color: #0f172a;
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      padding: 10px 8px;
      transition: all 0.18s ease;
    }

    .name-btn.selected {
      border-color: #22c55e;
      background: #dcfce7;
    }

    .name-btn.in-pool {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .slider-wrap {
      background: #f8fafc;
      border-radius: 16px;
      padding: 12px 12px 14px;
      margin-bottom: 14px;
    }

    .slider-label {
      text-align: center;
      font-size: 0.92rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .slider-value {
      text-align: center;
      font-size: 1.35rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #0f172a;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .slider-minmax {
      font-size: 0.84rem;
      font-weight: 700;
      color: #475569;
      width: 16px;
      text-align: center;
      flex: 0 0 16px;
    }

    .need-slider {
      flex: 1 1 auto;
      width: 100%;
    }

    .picker-status {
      text-align: center;
      font-size: 0.88rem;
      min-height: 22px;
      color: #b91c1c;
      margin-bottom: 10px;
    }

    .overlay-pool-box {
      background: #f8fafc;
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 14px;
    }

    .overlay-pool-title {
      margin: 0 0 8px 0;
      text-align: center;
      font-size: 0.96rem;
      font-weight: 700;
      color: #0f172a;
    }

    .overlay-pool-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }

    .overlay-pool-item {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 10px;
      background: #e2e8f0;
      border-radius: 12px;
      padding: 8px 10px;
      font-size: 0.9rem;
      color: #0f172a;
    }

    .overlay-pool-empty {
      text-align: center;
      font-size: 0.88rem;
      color: #64748b;
      padding: 10px 4px;
    }

    .draw-animation-box {
      background: #eff6ff;
      border: 2px solid #93c5fd;
      border-radius: 16px;
      padding: 12px;
      margin-top: 8px;
      display: none;
    }

    .draw-animation-box.finished {
      background: #ecfdf5;
      border-color: #22c55e;
    }

    .draw-animation-title {
      text-align: center;
      font-size: 0.85rem;
      color: #1d4ed8;
      margin: 0 0 6px 0;
      font-weight: 700;
    }

    .draw-animation-box.finished .draw-animation-title {
      color: #166534;
    }

    .draw-animation-name {
      text-align: center;
      font-size: 1.35rem;
      font-weight: 700;
      color: #1e3a8a;
      line-height: 1.1;
      min-height: 1.5em;
    }

    .draw-animation-box.finished .draw-animation-name {
      color: #166534;
    }

    .timer-modal-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      overflow: hidden;
    }

    .timer-modal-circle-wrap {
      position: relative;
      width: var(--modal-circle-size);
      height: var(--modal-circle-size);
      max-width: 100%;
      flex: 0 0 auto;
      margin: 4px auto 0;
    }

    .modal-corner-minute {
      position: absolute;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.34);
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.96);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.98rem;
      cursor: pointer;
      user-select: none;
      transition: all 0.18s ease;
      z-index: 2;
    }

    .modal-corner-minute.active {
      border-color: rgba(255,255,255,0.98);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.16);
      color: #fff;
    }

    .modal-corner-1 { top: -4px; left: -4px; }
    .modal-corner-2 { top: -4px; right: -4px; }
    .modal-corner-3 { bottom: -4px; left: -4px; }
    .modal-corner-4 { bottom: -4px; right: -4px; }

    .pie-timer.large {
      width: 100%;
      height: 100%;
    }

    .pie-timer.large .pie-center {
      inset: 40px;
    }

    .pie-timer.large .pie-time {
      font-size: clamp(1.5rem, 6.2vw, 2.4rem);
    }

    @media (min-width: 700px) {
      .page {
        max-width: 720px;
      }

      :root {
        --circle-size: 132px;
      }

      .pie-time,
      .selector-circle {
        font-size: 1.28rem;
      }

      .corner-minute {
        width: 28px;
        height: 28px;
        font-size: 0.82rem;
      }
    }

    @media (max-width: 520px) {
      .timer-modal {
        width: min(94vw, 480px);
        padding: 14px 12px 16px;
      }

      :root {
        --modal-circle-size: min(58vw, 250px);
      }

      .modal-corner-minute {
        width: 42px;
        height: 42px;
        font-size: 0.92rem;
      }

      .pie-timer.large .pie-center {
        inset: 34px;
      }

      .pie-timer.large .pie-time {
        font-size: clamp(1.3rem, 6vw, 2rem);
      }

      .timer-btn {
        min-height: 40px;
        font-size: 0.88rem;
        padding: 10px 14px;
      }
    }
  </style>
</head>
<body>
  <div id="page" class="page">

    <section class="panel timer-panel">
      <div class="timer-split">

        <div class="timer-left">
          <div class="timer-inner">
            <div class="corner-minute corner-1 active" onclick="event.stopPropagation(); selectMinute(1)">1</div>
            <div class="corner-minute corner-2" onclick="event.stopPropagation(); selectMinute(2)">2</div>
            <div class="corner-minute corner-3" onclick="event.stopPropagation(); selectMinute(3)">3</div>
            <div class="corner-minute corner-4" onclick="event.stopPropagation(); selectMinute(4)">4</div>

            <div class="timer-title">Timer</div>
            <div class="timer-subhint">Tryk på uret for stor visning</div>

            <div class="pie-timer" onclick="openTimerOverlay()">
              <svg viewBox="0 0 200 200" aria-hidden="true">
                <circle class="pie-bg" cx="100" cy="100" r="92"></circle>
                <path id="pieSlice" class="pie-slice" d=""></path>
              </svg>
              <div class="pie-center">
                <div id="pieTime" class="pie-time">01:00</div>
              </div>
            </div>

            <button class="reset-btn" onclick="resetTimer()">Nulstil</button>
          </div>
        </div>

        <div class="timer-right">
          <div class="timer-inner">
            <div class="timer-title">Den vejledte</div>

            <button id="selectorCircle" class="selector-circle" onclick="openPickerOverlay()">
              Tryk for tilføj
            </button>

            <button class="reset-btn" onclick="resetSelectionAndPool()">
              Nulstil
            </button>
          </div>
        </div>

      </div>
    </section>

    <section class="panel section challenge">
      <div class="center-block">
        <div class="section-top">
          <h2>2. Udfordringen</h2>
        </div>

        <div class="button-row">
          <button
            class="desc-btn"
            onclick="openOverlay('2. Udfordringen', '<ul><li>Du har nu 3 minutter til at fortælle om din udfordring og hvad du har forsøgt indtil nu. (hvilke evt. følelser vækker dette i dig?)</li><li>Vejleder eller gruppen stiller &quot;neutrale&quot; opklarende spørgsmål.</li><li><strong>Fokusperson vender nu ryggen til.</strong></li><li>Gruppen fortæller, hvad de har hørt/set har virket godt indtil videre.</li><li>Gruppen fortæller om nye perspektiver, egne erfaringer og løsningsforslag.</li><li><strong>Fokuspersonen vender sig om mod gruppen.</strong></li><li>Fokuspersonen fortæller om evt. nye perspektiver og om eller hvornår de evt. vil afprøve dette.</li><li>Vejledningen er færdig:)</li></ul>')"
          >
            Læs mere
          </button>
        </div>
      </div>
    </section>

    <section class="panel section story">
      <div class="center-block">
        <div class="section-top">
          <h2>3. Den gode fortælling</h2>
        </div>

        <div class="button-row">
          <button
            class="desc-btn"
            onclick="openOverlay('3. Den gode fortælling', '<ul><li>I har nu på skift 2 minutter til at fortælle en oplevelse der for nyligt er lykkedes godt i huset, for en ung eller for dig selv arbejdsmæssigt.</li></ul>')"
          >
            Læs mere
          </button>
        </div>
      </div>
    </section>

    <section class="panel section orientation">
      <div class="center-block">
        <div class="section-top">
          <h2>1. Orientering</h2>
        </div>

        <div class="button-row">
          <button
            class="desc-btn"
            onclick="openOverlay('1. Orientering', '<p>Du har 2 minutter til at orientere om ting i huset, der kan have relevans for dine kollegaer. Start gerne med at beskrive, hvad relevansen er.</p>')"
          >
            Læs mere
          </button>
        </div>
      </div>
    </section>

  </div>

  <div id="overlay" class="overlay" onclick="closeOverlay()">
    <div class="modal" onclick="event.stopPropagation()">
      <h3 id="modalTitle" class="modal-title">Titel</h3>
      <div id="modalText" class="modal-text"></div>
      <div class="modal-actions">
        <button class="close-btn" onclick="closeOverlay()">Luk</button>
      </div>
    </div>
  </div>

  <div id="pickerOverlay" class="picker-overlay" onclick="closePickerOverlay()">
    <div class="picker-modal" onclick="event.stopPropagation()">
      <h3 class="picker-title">Vælg person og behov</h3>

      <div id="nameGrid" class="name-grid"></div>

      <div class="slider-wrap">
        <div class="slider-label">Hvor meget fylder behovet?</div>
        <div id="sliderValue" class="slider-value">5</div>
        <div class="slider-row">
          <div class="slider-minmax">1</div>
          <input
            id="needSlider"
            class="need-slider"
            type="range"
            min="1"
            max="10"
            step="1"
            value="5"
            oninput="updateSliderValue(this.value)"
          />
          <div class="slider-minmax">10</div>
        </div>
      </div>

      <div id="pickerStatus" class="picker-status"></div>

      <div class="picker-actions" style="margin-bottom:14px;">
        <button class="picker-btn" onclick="addSelectedToPool()">Tilføj til pulje</button>
      </div>

      <div class="overlay-pool-box">
        <p class="overlay-pool-title">Pulje</p>
        <div id="overlayPoolList" class="overlay-pool-list"></div>

        <div class="picker-actions">
          <button id="drawOverlayBtn" class="draw-overlay-btn" onclick="drawSelectedPersonWithAnimation()" disabled>
            Træk vejledt
          </button>
          <button class="picker-btn" onclick="resetPoolOnly()">
            Nulstil pulje
          </button>
          <button class="picker-btn" onclick="closePickerOverlay()">
            Luk
          </button>
        </div>

        <div id="drawAnimationBox" class="draw-animation-box">
          <p id="drawAnimationTitle" class="draw-animation-title">Udtrækker vejledt...</p>
          <div id="drawAnimationName" class="draw-animation-name"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="timerOverlay" class="timer-overlay" onclick="closeTimerOverlay()">
    <div class="timer-modal" onclick="event.stopPropagation()">
      <h3 class="timer-modal-title">Timer</h3>
      <div class="timer-modal-hint">Tryk på uret for start / pause</div>

      <div class="timer-modal-body">
        <div class="timer-modal-circle-wrap">
          <div class="modal-corner-minute modal-corner-1 active" onclick="event.stopPropagation(); selectMinute(1)">1</div>
          <div class="modal-corner-minute modal-corner-2" onclick="event.stopPropagation(); selectMinute(2)">2</div>
          <div class="modal-corner-minute modal-corner-3" onclick="event.stopPropagation(); selectMinute(3)">3</div>
          <div class="modal-corner-minute modal-corner-4" onclick="event.stopPropagation(); selectMinute(4)">4</div>

          <div class="pie-timer large" onclick="toggleClockTimer()">
            <svg viewBox="0 0 200 200" aria-hidden="true">
              <circle class="pie-bg" cx="100" cy="100" r="92"></circle>
              <path id="pieSliceModal" class="pie-slice" d=""></path>
            </svg>
            <div class="pie-center">
              <div id="pieTimeModal" class="pie-time">01:00</div>
            </div>
          </div>
        </div>

        <div class="timer-modal-actions">
          <button class="timer-btn" onclick="toggleClockTimer()">
            Start / pause
          </button>
          <button class="timer-btn" onclick="resetTimer()">
            Nulstil
          </button>
          <button class="timer-btn" onclick="closeTimerOverlay()">
            Luk
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let audioCtx = null;

    function initAudio() {
      try {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
      } catch (err) {
        console.log('Audio kunne ikke initialiseres:', err);
      }
    }

    function beep(freq = 720, duration = 180, volume = 0.07, delay = 0) {
      setTimeout(() => {
        try {
          initAudio();
          if (!audioCtx) return;

          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();

          osc.type = 'sine';
          osc.frequency.value = freq;

          gain.gain.setValueAtTime(0, audioCtx.currentTime);
          gain.gain.linearRampToValueAtTime(volume, audioCtx.currentTime + 0.01);
          gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration / 1000);

          osc.connect(gain);
          gain.connect(audioCtx.destination);

          osc.start();
          osc.stop(audioCtx.currentTime + duration / 1000 + 0.02);
        } catch (err) {
          console.log('Kunde ikke afspille lyd:', err);
        }
      }, delay);
    }

    function doubleBeep() {
      beep(720, 180, 0.075, 0);
      beep(720, 180, 0.075, 240);
    }

    function tripleBeep() {
      beep(720, 180, 0.08, 0);
      beep(720, 180, 0.08, 240);
      beep(720, 180, 0.08, 480);
    }

    let totalSeconds = 60;
    let remainingSeconds = totalSeconds;
    let timerInterval = null;
    let running = false;
    let warningBeepPlayed = false;

    const pieSlice = document.getElementById('pieSlice');
    const pieTime = document.getElementById('pieTime');
    const pieSliceModal = document.getElementById('pieSliceModal');
    const pieTimeModal = document.getElementById('pieTimeModal');

    function formatTime(seconds) {
      const min = Math.floor(seconds / 60);
      const sec = seconds % 60;
      return String(min).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
    }

    function polarToCartesian(cx, cy, r, angleDeg) {
      const rad = (angleDeg - 90) * Math.PI / 180.0;
      return {
        x: cx + (r * Math.cos(rad)),
        y: cy + (r * Math.sin(rad))
      };
    }

    function describePieSlice(cx, cy, r, fraction) {
      if (fraction <= 0) return '';

      if (fraction >= 0.999999) {
        return `
          M ${cx} ${cy}
          m 0 -${r}
          a ${r} ${r} 0 1 1 0 ${2 * r}
          a ${r} ${r} 0 1 1 0 -${2 * r}
          Z
        `;
      }

      const startAngle = 0;
      const endAngle = -(fraction * 360);

      const start = polarToCartesian(cx, cy, r, startAngle);
      const end = polarToCartesian(cx, cy, r, endAngle);
      const largeArcFlag = fraction > 0.5 ? 1 : 0;

      return [
        `M ${cx} ${cy}`,
        `L ${start.x} ${start.y}`,
        `A ${r} ${r} 0 ${largeArcFlag} 0 ${end.x} ${end.y}`,
        `Z`
      ].join(' ');
    }

    function updateSinglePie(pathEl, fraction) {
      pathEl.setAttribute('d', describePieSlice(100, 100, 92, fraction));

      if (remainingSeconds <= 20 && remainingSeconds > 0) {
        pathEl.classList.add('warning');
      } else {
        pathEl.classList.remove('warning');
      }
    }

    function updatePie() {
      const fraction = remainingSeconds / totalSeconds;
      updateSinglePie(pieSlice, fraction);
      updateSinglePie(pieSliceModal, fraction);
    }

    function updateMinuteButtons() {
      const activeMinute = totalSeconds / 60;

      document.querySelectorAll('.corner-minute, .modal-corner-minute').forEach(el => {
        el.classList.remove('active');
      });

      document.querySelectorAll('.corner-' + activeMinute).forEach(el => {
        el.classList.add('active');
      });

      document.querySelectorAll('.modal-corner-' + activeMinute).forEach(el => {
        el.classList.add('active');
      });
    }

    function updateUI() {
      const timeText = formatTime(remainingSeconds);
      pieTime.textContent = timeText;
      pieTimeModal.textContent = timeText;
      updatePie();
      updateMinuteButtons();
    }

    function selectMinute(minuteValue) {
      initAudio();

      if (running) {
        pauseTimerOnly();
      }

      totalSeconds = minuteValue * 60;
      remainingSeconds = totalSeconds;
      warningBeepPlayed = false;

      updateUI();
    }

    function tick() {
      if (remainingSeconds <= 0) return;

      remainingSeconds--;

      if (remainingSeconds === 20 && !warningBeepPlayed) {
        warningBeepPlayed = true;
        doubleBeep();
      }

      updateUI();

      if (remainingSeconds === 0) {
        clearInterval(timerInterval);
        timerInterval = null;
        running = false;
        tripleBeep();

        setTimeout(() => {
          remainingSeconds = totalSeconds;
          warningBeepPlayed = false;
          updateUI();
        }, 2400);
      }
    }

    function startTimer() {
      if (running) return;
      initAudio();
      running = true;
      timerInterval = setInterval(tick, 1000);
    }

    function pauseTimerOnly() {
      clearInterval(timerInterval);
      timerInterval = null;
      running = false;
      updateUI();
    }

    function resetTimer() {
      initAudio();
      clearInterval(timerInterval);
      timerInterval = null;
      running = false;
      warningBeepPlayed = false;
      remainingSeconds = totalSeconds;
      updateUI();
    }

    function toggleClockTimer() {
      initAudio();
      if (running) {
        pauseTimerOnly();
      } else {
        startTimer();
      }
    }

    function openOverlay(title, html) {
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalText').innerHTML = html;
      document.getElementById('overlay').classList.add('show');
      document.getElementById('page').classList.add('blurred');
    }

    function closeOverlay() {
      document.getElementById('overlay').classList.remove('show');
      document.getElementById('page').classList.remove('blurred');
    }

    function openTimerOverlay() {
      document.getElementById('timerOverlay').classList.add('show');
      document.getElementById('page').classList.add('blurred');
      updateUI();
    }

    function closeTimerOverlay() {
      document.getElementById('timerOverlay').classList.remove('show');
      document.getElementById('page').classList.remove('blurred');
    }

    const participantNames = ['Michael', 'Sanne', 'Bettina', 'Ditte', 'Peter', 'Anja'];
    let pool = [];
    let selectedName = null;
    let drawnPerson = null;
    let drawAnimationInterval = null;
    let isDrawing = false;

    const nameGrid = document.getElementById('nameGrid');
    const needSlider = document.getElementById('needSlider');
    const sliderValue = document.getElementById('sliderValue');
    const pickerStatus = document.getElementById('pickerStatus');
    const selectorCircle = document.getElementById('selectorCircle');
    const pickerOverlay = document.getElementById('pickerOverlay');
    const overlayPoolList = document.getElementById('overlayPoolList');
    const drawOverlayBtn = document.getElementById('drawOverlayBtn');
    const drawAnimationBox = document.getElementById('drawAnimationBox');
    const drawAnimationTitle = document.getElementById('drawAnimationTitle');
    const drawAnimationName = document.getElementById('drawAnimationName');

    function renderNameButtons() {
      nameGrid.innerHTML = '';

      participantNames.forEach(name => {
        const btn = document.createElement('button');
        btn.className = 'name-btn';
        btn.textContent = name;

        const alreadyInPool = pool.some(p => p.name === name);

        if (selectedName === name) {
          btn.classList.add('selected');
        }

        if (alreadyInPool) {
          btn.classList.add('in-pool');
          btn.disabled = true;
        } else {
          btn.onclick = () => {
            selectedName = name;
            pickerStatus.textContent = '';
            renderNameButtons();
          };
        }

        nameGrid.appendChild(btn);
      });
    }

    function updateSliderValue(value) {
      sliderValue.textContent = value;
    }

    function openPickerOverlay() {
      pickerOverlay.classList.add('show');
      document.getElementById('page').classList.add('blurred');
      selectedName = null;
      needSlider.value = 5;
      updateSliderValue(5);
      pickerStatus.textContent = '';
      renderNameButtons();
      renderOverlayPool();

      if (drawnPerson) {
        drawAnimationBox.style.display = 'block';
        drawAnimationBox.classList.add('finished');
        drawAnimationTitle.textContent = 'Vejledt fundet';
        drawAnimationName.textContent = drawnPerson;
      } else {
        drawAnimationBox.style.display = 'none';
        drawAnimationBox.classList.remove('finished');
        drawAnimationTitle.textContent = 'Udtrækker vejledt...';
        drawAnimationName.textContent = '';
      }
    }

    function closePickerOverlay() {
      if (isDrawing) return;
      pickerOverlay.classList.remove('show');
      document.getElementById('page').classList.remove('blurred');
      selectedName = null;
      pickerStatus.textContent = '';
    }

    function addSelectedToPool() {
      if (isDrawing) return;

      if (!selectedName) {
        pickerStatus.textContent = 'Vælg først en person.';
        return;
      }

      const need = Number(needSlider.value);

      if (pool.some(p => p.name === selectedName)) {
        pickerStatus.textContent = selectedName + ' er allerede i puljen.';
        return;
      }

      pool.push({
        name: selectedName,
        need: need
      });

      selectedName = null;
      needSlider.value = 5;
      updateSliderValue(5);
      pickerStatus.textContent = '';
      drawnPerson = null;

      drawAnimationBox.style.display = 'none';
      drawAnimationBox.classList.remove('finished');
      drawAnimationTitle.textContent = 'Udtrækker vejledt...';
      drawAnimationName.textContent = '';

      renderNameButtons();
      renderOverlayPool();
      updateSelectorDisplay();
    }

    function removeFromPool(nameToRemove) {
      if (isDrawing) return;

      pool = pool.filter(person => person.name !== nameToRemove);

      if (drawnPerson === nameToRemove) {
        drawnPerson = null;
        drawAnimationBox.style.display = 'none';
        drawAnimationBox.classList.remove('finished');
        drawAnimationTitle.textContent = 'Udtrækker vejledt...';
        drawAnimationName.textContent = '';
      }

      renderNameButtons();
      renderOverlayPool();
      updateSelectorDisplay();
    }

    function renderOverlayPool() {
      overlayPoolList.innerHTML = '';

      if (pool.length === 0) {
        overlayPoolList.innerHTML = '<div class="overlay-pool-empty">Ingen i puljen endnu</div>';
      } else {
        pool.forEach(person => {
          const item = document.createElement('div');
          item.className = 'overlay-pool-item';

          const nameEl = document.createElement('span');
          nameEl.textContent = person.name;

          const needEl = document.createElement('span');
          needEl.textContent = 'Behov ' + person.need;

          const removeBtn = document.createElement('button');
          removeBtn.className = 'remove-pool-btn';
          removeBtn.textContent = 'Fjern';
          removeBtn.onclick = () => removeFromPool(person.name);

          item.appendChild(nameEl);
          item.appendChild(needEl);
          item.appendChild(removeBtn);

          overlayPoolList.appendChild(item);
        });
      }

      drawOverlayBtn.disabled = pool.length === 0 || isDrawing;
    }

    function weightedPick(items) {
      const totalWeight = items.reduce((sum, item) => sum + item.need, 0);
      let random = Math.random() * totalWeight;

      for (const item of items) {
        random -= item.need;
        if (random <= 0) {
          return item;
        }
      }

      return items[items.length - 1];
    }

    function getRandomPoolName() {
      if (pool.length === 0) return '';
      const index = Math.floor(Math.random() * pool.length);
      return pool[index].name;
    }

    function drawSelectedPersonWithAnimation() {
      if (pool.length === 0 || isDrawing) return;

      isDrawing = true;
      drawOverlayBtn.disabled = true;
      pickerStatus.textContent = '';

      drawAnimationBox.style.display = 'block';
      drawAnimationBox.classList.remove('finished');
      drawAnimationTitle.textContent = 'Udtrækker vejledt...';

      const finalSelected = weightedPick(pool);

      drawAnimationName.textContent = getRandomPoolName();

      drawAnimationInterval = setInterval(() => {
        drawAnimationName.textContent = getRandomPoolName();
      }, 90);

      setTimeout(() => {
        clearInterval(drawAnimationInterval);
        drawAnimationInterval = null;

        drawnPerson = finalSelected.name;
        drawAnimationName.textContent = finalSelected.name;
        drawAnimationBox.classList.add('finished');
        drawAnimationTitle.textContent = 'Vejledt fundet';

        selectorCircle.textContent = finalSelected.name;
        selectorCircle.classList.add('has-result');

        isDrawing = false;
        renderOverlayPool();
      }, 3000);
    }

    function updateSelectorDisplay() {
      if (drawnPerson) {
        selectorCircle.textContent = drawnPerson;
        selectorCircle.classList.add('has-result');
      } else {
        selectorCircle.textContent = 'Tryk for tilføj';
        selectorCircle.classList.remove('has-result');
      }
    }

    function resetPoolOnly() {
      if (isDrawing) return;
      pool = [];
      selectedName = null;
      drawnPerson = null;
      pickerStatus.textContent = '';

      drawAnimationBox.style.display = 'none';
      drawAnimationBox.classList.remove('finished');
      drawAnimationTitle.textContent = 'Udtrækker vejledt...';
      drawAnimationName.textContent = '';

      renderNameButtons();
      renderOverlayPool();
      updateSelectorDisplay();
    }

    function resetSelectionAndPool() {
      if (isDrawing) return;
      pool = [];
      selectedName = null;
      drawnPerson = null;
      pickerStatus.textContent = '';

      drawAnimationBox.style.display = 'none';
      drawAnimationBox.classList.remove('finished');
      drawAnimationTitle.textContent = 'Udtrækker vejledt...';
      drawAnimationName.textContent = '';

      if (drawAnimationInterval) {
        clearInterval(drawAnimationInterval);
        drawAnimationInterval = null;
      }

      isDrawing = false;
      renderNameButtons();
      renderOverlayPool();
      updateSelectorDisplay();
    }

    updateUI();
    updateSelectorDisplay();

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(() => console.log('Service worker registreret'))
          .catch((err) => console.log('Service worker fejl:', err));
      });
    }
  </script>
</body>
</html>
